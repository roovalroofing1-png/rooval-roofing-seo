<style id="rrfoot-fix">
[data-elementor-type="footer"] a[href^="tel:"],
.elementor-location-footer a[href^="tel:"],
footer a[href^="tel:"]{color:#ffffff!important}
.rrfoot-link{color:#ffffff!important;text-decoration:none!important;cursor:pointer}
.rrfoot-link:hover{color:#ffd23f!important;text-decoration:underline!important}
</style>
<script>
/* Rooval footer contact fixes: visible phone + clickable email / address / logo */
(function(){
  function wrap(node,href,ext){
    var a=document.createElement('a');
    a.href=href; a.className='rrfoot-link'; a.textContent=node.textContent;
    if(ext){a.target='_blank';a.rel='noopener';}
    node.parentNode.replaceChild(a,node);
  }
  function run(){
    var root=document.querySelector('[data-elementor-type="footer"]')
          || document.querySelector('.elementor-location-footer')
          || document.querySelector('footer');
    if(!root) return;
    // 1) make any footer phone link white (in case CSS is overridden)
    root.querySelectorAll('a[href^="tel:"]').forEach(function(a){ a.style.color='#ffffff'; });
    // 2) linkify the email + address text nodes
    var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null), nodes=[];
    while(w.nextNode()) nodes.push(w.currentNode);
    nodes.forEach(function(n){
      var t=(n.textContent||'').trim();
      if(!t || (n.parentNode && n.parentNode.closest('a'))) return;
      if(t==='info@rooval-roofing.com') wrap(n,'mailto:info@rooval-roofing.com',false);
      else if(t.indexOf('2526 N Elm')===0) wrap(n,'https://www.google.com/maps/search/?api=1&query=2526%20N%20Elm%20Dr%20Lehi%20UT%2084043',true);
    });
    // 3) make the ROOVAL-ROOFING wordmark link home
    var heads=root.querySelectorAll('h1,h2,h3,h4,.elementor-heading-title');
    for(var i=0;i<heads.length;i++){
      var h=heads[i];
      if(/ROOVAL[ -]?ROOFING/i.test(h.textContent) && !h.querySelector('a') && !(h.closest && h.closest('a'))){
        var a=document.createElement('a'); a.href='/'; a.setAttribute('aria-label','Rooval Roofing home');
        a.style.color='inherit'; a.style.textDecoration='none';
        while(h.firstChild) a.appendChild(h.firstChild);
        h.appendChild(a); break;
      }
    }
  }
  if(document.readyState!=='loading') run();
  else document.addEventListener('DOMContentLoaded',run);
})();
</script>
